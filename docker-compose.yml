version: "3.8"

services:
  zatca-daemon:
    build: .
    container_name: zatca-daemon
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4222:4222"   # NATS — your backend publishes here
      - "8222:8222"   # NATS monitoring — http://localhost:8222
    volumes:
      - zatca-xml:/data/zatca-xml       # signed XML storage
      - nats-data:/data/nats            # JetStream persistence
    environment:
      # --- DB connection (required) ---
      DB_USER: zatca_daemon
      DB_PASS: ""                        # <-- set your password
      DB_HOST: host.docker.internal      # <-- host.docker.internal = host machine
      DB_PORT: "3306"
      MASTER_DB: zatca_master

      # --- Optional: separate admin user for onboarding ---
      # ADMIN_DB_USER: zatca_admin
      # ADMIN_DB_PASS: ""

      # --- Encryption key for sensitive ZATCA credentials (required) ---
      # Generate with: openssl rand -base64 32
      ENCRYPT_KEY: ""                    # <-- set your 32-byte key (base64 or 64 hex chars)

      # --- NATS monitoring password (required if port 8222 is exposed) ---
      MONITOR_PASS: ""                   # <-- set a strong password for http://host:8222

      # --- SMTP for error alerts (uses host SMTP) ---
      SMTP_HOST: host.docker.internal
      SMTP_PORT: "25"
    # No command override needed — daemon reads env vars above
    # Override only what differs from defaults:
    command: ["--nats-data=/data/nats"]

volumes:
  zatca-xml:
  nats-data:
